apiVersion: batch/v1
kind: Job
metadata:
  name: karpenter-test
spec:
  parallelism: 5
  completions: 5
  template:
    spec:
      containers:
      - name: test
        image: public.ecr.aws/amazonlinux/amazonlinux:2023
        command: ["sleep", "300"]
        resources:
          requests:
            cpu: "1"
            memory: "2Gi"
      restartPolicy: Never
