apiVersion: clickhouse.com/v1alpha1
kind: ClickHouseCluster
metadata:
  name: clickhouse
  namespace: data-stack-dev
spec:
  replicas: 1
  shards: 1
  dataVolumeClaimSpec:
    accessModes:
      - ReadWriteOnce
    resources:
      requests:
        storage: 50Gi
  containerTemplate:
    resources:
      requests:
        cpu: "1"
        memory: "4Gi"
      limits:
        cpu: "4"
        memory: "8Gi"
  keeperClusterRef:
    name: clickhouse-keeper
  podTemplate:
    serviceAccountName: spark-bucket-read-sa
  settings:
    defaultUserPassword:
      secret:
        name: clickhouse-password
        key: password
